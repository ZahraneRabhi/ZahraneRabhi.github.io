<div id="contact" class="relative bg-black py-20 px-6 overflow-hidden">
  <!-- Matrix-style background -->
  <div class="absolute inset-0">
    <div class="absolute inset-0 bg-gradient-to-b from-green-900/5 via-black to-green-900/5"></div>
    <div class="absolute inset-0" style="background-image: radial-gradient(circle at 30% 30%, #00ff0010 0%, transparent 50%), radial-gradient(circle at 70% 70%, #00ff0008 0%, transparent 50%);"></div>
  </div>

  <div class="relative max-w-3xl mx-auto">
    <!-- Header -->
    <div class="text-center mb-16">
      <div class="inline-flex items-center justify-center p-3 bg-green-500/10 border border-green-500/30 rounded-lg mb-6">
        <svg class="w-8 h-8 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
        </svg>
      </div>
      <h2 class="text-5xl md:text-6xl font-bold text-green-400 mb-4 font-mono tracking-wider">
        <span class="inline-block animate-pulse">&gt;</span> CONTACT.EXE
      </h2>
      <p class="text-green-300/80 text-lg font-mono">
        >> Initialize connection protocol
      </p>
      <div class="w-32 h-0.5 bg-green-400 mx-auto mt-6 animate-pulse"></div>
    </div>

    <!-- Form Card -->
    <form [formGroup]="form" (ngSubmit)="send()"
      class="bg-black/80 border border-green-500/30 rounded-lg overflow-hidden shadow-2xl backdrop-blur-sm">
      <!-- Terminal bar -->
      <div class="bg-black/60 border-b border-green-500/30 px-4 py-2 flex items-center gap-2">
        <div class="w-3 h-3 rounded-full bg-red-500/70"></div>
        <div class="w-3 h-3 rounded-full bg-yellow-500/70"></div>
        <div class="w-3 h-3 rounded-full bg-green-500/70"></div>
        <span class="ml-4 text-green-400 font-mono text-sm">contact.sys</span>
      </div>

      <div class="p-8">
        <!-- Name -->
        <div class="mb-6">
          <label class="block text-green-500/70 font-mono text-sm mb-2">// from_name</label>
          <input formControlName="name" type="text" placeholder="John Doe"
            class="w-full bg-black/60 border border-green-500/30 rounded px-4 py-3 text-green-400 font-mono text-sm placeholder-green-900 focus:outline-none focus:border-green-400/60 transition-colors duration-200" />
          <div *ngIf="form.get('name')?.invalid && form.get('name')?.touched"
            class="text-red-400 font-mono text-xs mt-1">&gt; name is required</div>
        </div>

        <!-- Email -->
        <div class="mb-6">
          <label class="block text-green-500/70 font-mono text-sm mb-2">// from_email</label>
          <input formControlName="email" type="email" placeholder="you@domain.com"
            class="w-full bg-black/60 border border-green-500/30 rounded px-4 py-3 text-green-400 font-mono text-sm placeholder-green-900 focus:outline-none focus:border-green-400/60 transition-colors duration-200" />
          <div *ngIf="form.get('email')?.invalid && form.get('email')?.touched"
            class="text-red-400 font-mono text-xs mt-1">&gt; valid email required</div>
        </div>

        <!-- Message -->
        <div class="mb-8">
          <label class="block text-green-500/70 font-mono text-sm mb-2">// message</label>
          <textarea formControlName="message" rows="5" placeholder="Your message..."
            class="w-full bg-black/60 border border-green-500/30 rounded px-4 py-3 text-green-400 font-mono text-sm placeholder-green-900 focus:outline-none focus:border-green-400/60 transition-colors duration-200 resize-none"></textarea>
          <div *ngIf="form.get('message')?.invalid && form.get('message')?.touched"
            class="text-red-400 font-mono text-xs mt-1">&gt; message required (min 10 chars)</div>
        </div>

        <!-- Feedback -->
        <div *ngIf="sent"
          class="mb-4 px-4 py-3 bg-green-500/10 border border-green-500/30 rounded font-mono text-green-400 text-sm">
          &gt; Message transmitted successfully ✓
        </div>
        <div *ngIf="sendError"
          class="mb-4 px-4 py-3 bg-red-500/10 border border-red-500/30 rounded font-mono text-red-400 text-sm">
          &gt; Transmission failed. Try: <a href="mailto:ZahraneRabhi@outlook.com" class="underline hover:text-red-300">ZahraneRabhi@outlook.com</a>
        </div>

        <!-- Submit -->
        <button type="submit" [disabled]="sending"
          class="w-full group inline-flex items-center justify-center gap-3 px-8 py-4 bg-black border border-green-500/30 text-green-400 font-mono text-lg rounded hover:bg-green-500/10 hover:border-green-400/60 transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed">
          <span>{{ sending ? '&gt; transmitting...' : '&gt; ./send_message' }}</span>
          <div class="w-3 h-5 bg-green-400" [class.animate-pulse]="!sending"></div>
        </button>
      </div>

      <!-- Matrix corners -->
      <div class="absolute top-2 left-2 w-4 h-4 border-l-2 border-t-2 border-green-400/30"></div>
      <div class="absolute top-2 right-2 w-4 h-4 border-r-2 border-t-2 border-green-400/30"></div>
      <div class="absolute bottom-2 left-2 w-4 h-4 border-l-2 border-b-2 border-green-400/30"></div>
      <div class="absolute bottom-2 right-2 w-4 h-4 border-r-2 border-b-2 border-green-400/30"></div>
    </form>
  </div>
</div>
